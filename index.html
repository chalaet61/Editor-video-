<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Photo Editor</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
      color: #e0e0e0;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 30px;
    }

    h1 {
      font-size: 2.5em;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .main-content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      margin-bottom: 30px;
    }

    .canvas-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: rgba(0, 0, 0, 0.3);
      padding: 20px;
      border-radius: 12px;
      border: 2px solid #444;
    }

    canvas {
      max-width: 100%;
      max-height: 600px;
      border: 2px solid #667eea;
      border-radius: 8px;
      background: #000;
      margin: 15px 0;
    }

    .controls-panel {
      background: rgba(0, 0, 0, 0.5);
      padding: 25px;
      border-radius: 12px;
      border: 2px solid #444;
    }

    .control-group {
      margin-bottom: 25px;
    }

    .control-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: #667eea;
      font-size: 0.95em;
    }

    .control-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    input[type="range"] {
      flex: 1;
      height: 6px;
      border-radius: 3px;
      background: #444;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      cursor: pointer;
      box-shadow: 0 0 8px rgba(102, 126, 234, 0.6);
    }

    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      cursor: pointer;
      border: none;
      box-shadow: 0 0 8px rgba(102, 126, 234, 0.6);
    }

    .value-display {
      min-width: 45px;
      text-align: right;
      color: #667eea;
      font-weight: 600;
      font-size: 0.9em;
    }

    input[type="file"] {
      display: none;
    }

    .file-input-label {
      display: inline-block;
      padding: 12px 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
      margin-bottom: 15px;
    }

    .file-input-label:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(102, 126, 234, 0.4);
    }

    .button-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 25px;
    }

    button {
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-apply {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      grid-column: 1 / -1;
    }

    .btn-apply:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(102, 126, 234, 0.4);
    }

    .btn-download {
      background: #2ecc71;
      color: white;
    }

    .btn-download:hover {
      background: #27ae60;
      transform: translateY(-2px);
    }

    .btn-reset {
      background: #e74c3c;
      color: white;
    }

    .btn-reset:hover {
      background: #c0392b;
      transform: translateY(-2px);
    }

    .preset-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 15px;
    }

    .btn-preset {
      padding: 8px;
      background: #444;
      color: #ddd;
      border: 1px solid #666;
      border-radius: 6px;
      font-size: 0.85em;
    }

    .btn-preset:hover {
      background: #555;
      border-color: #667eea;
    }

    .comparison-container {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }

    .comparison-item {
      flex: 1;
      text-align: center;
    }

    .comparison-item label {
      display: block;
      margin-bottom: 10px;
      font-size: 0.9em;
      color: #667eea;
    }

    .comparison-item canvas {
      max-width: 100%;
      max-height: 300px;
    }

    @media (max-width: 768px) {
      .main-content {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 1.8em;
      }

      .button-group {
        grid-template-columns: 1fr;
      }

      .comparison-container {
        flex-direction: column;
      }
    }

    .status-message {
      text-align: center;
      padding: 10px;
      margin: 10px 0;
      border-radius: 6px;
      display: none;
      font-weight: 600;
    }

    .status-message.show {
      display: block;
    }

    .status-message.success {
      background: #2ecc71;
      color: white;
    }

    .status-message.error {
      background: #e74c3c;
      color: white;
    }
  </style>
</head>

<body>

  <div class="container">
    <header>
      <h1>🎨 Advanced Photo Editor</h1>
      <p>Professional image editing tools at your fingertips</p>
    </header>

    <div class="status-message" id="statusMessage"></div>

    <div class="main-content">
      <!-- Canvas Section -->
      <div class="canvas-container">
        <label for="upload" class="file-input-label">📁 Choose Image</label>
        <input type="file" id="upload" accept="image/*">
        <canvas id="canvas"></canvas>
        <div class="comparison-container" id="comparisonContainer" style="display: none;">
          <div class="comparison-item">
            <label>Before</label>
            <canvas id="canvasBefore"></canvas>
          </div>
          <div class="comparison-item">
            <label>After</label>
            <canvas id="canvasAfter"></canvas>
          </div>
        </div>
      </div>

      <!-- Controls Section -->
      <div class="controls-panel">
        <div class="control-group">
          <label>✨ Brightness</label>
          <div class="control-wrapper">
            <input type="range" id="brightness" min="0" max="200" value="100">
            <span class="value-display" id="brightnessValue">100%</span>
          </div>
        </div>

        <div class="control-group">
          <label>🎯 Contrast</label>
          <div class="control-wrapper">
            <input type="range" id="contrast" min="0" max="200" value="100">
            <span class="value-display" id="contrastValue">100%</span>
          </div>
        </div>

        <div class="control-group">
          <label>🌈 Saturation</label>
          <div class="control-wrapper">
            <input type="range" id="saturation" min="0" max="200" value="100">
            <span class="value-display" id="saturationValue">100%</span>
          </div>
        </div>

        <div class="control-group">
          <label>🫧 Blur</label>
          <div class="control-wrapper">
            <input type="range" id="blur" min="0" max="20" value="0">
            <span class="value-display" id="blurValue">0px</span>
          </div>
        </div>

        <div class="control-group">
          <label>🔄 Rotation</label>
          <div class="control-wrapper">
            <input type="range" id="rotation" min="0" max="360" value="0">
            <span class="value-display" id="rotationValue">0°</span>
          </div>
        </div>

        <div class="control-group">
          <label>🌅 Hue</label>
          <div class="control-wrapper">
            <input type="range" id="hue" min="0" max="360" value="0">
            <span class="value-display" id="hueValue">0°</span>
          </div>
        </div>

        <div class="control-group">
          <label>🎨 Sepia</label>
          <div class="control-wrapper">
            <input type="range" id="sepia" min="0" max="100" value="0">
            <span class="value-display" id="sepiaValue">0%</span>
          </div>
        </div>

        <div class="control-group">
          <label>⚫ Grayscale</label>
          <div class="control-wrapper">
            <input type="range" id="grayscale" min="0" max="100" value="0">
            <span class="value-display" id="grayscaleValue">0%</span>
          </div>
        </div>

        <div class="control-group">
          <label>Presets</label>
          <div class="preset-buttons">
            <button class="btn-preset" onclick="applyPreset('vintage')">Vintage</button>
            <button class="btn-preset" onclick="applyPreset('bw')">B&W</button>
            <button class="btn-preset" onclick="applyPreset('warm')">Warm</button>
            <button class="btn-preset" onclick="applyPreset('cool')">Cool</button>
          </div>
        </div>

        <div class="button-group">
          <button class="btn-apply" onclick="applyFilters()">✓ Apply Filters</button>
          <button class="btn-download" onclick="downloadImage()">⬇️ Download</button>
          <button class="btn-reset" onclick="resetFilters()">⟲ Reset</button>
        </div>
      </div>
    </div>
  </div>

  <script src="editor.js"></script>

</body>
</html>
